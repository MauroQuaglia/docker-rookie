services:
  frontend:
    image: "app:1"
    ports:
      - "7654:4567"
    networks:
      - "my-net"
    deploy:
      replicas: 1
      restart_policy:
        condition: "on-failure"
    configs:
      - source: "stuff_config"
        target:  "/etc/app/stuff.conf"
  backend:
    image: "redis:7.4.6"
    networks:
      - "my-net"
    deploy:
      replicas: 1
      restart_policy:
        condition: "on-failure"

configs:
  stuff_config:
    file: "./stuff.conf"

networks:
  my-net: