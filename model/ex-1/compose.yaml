# Si aspetta un modello AI già funzionante
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3033:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:12434
      - WEBUI_AUTH=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui: